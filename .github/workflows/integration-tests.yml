name: Integration Tests

on:
  # Run weekly on Sunday at 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'
  # Allow manual trigger
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  integration-tests:
    name: Integration Tests with CourtListener API
    runs-on: ubuntu-latest
    # Only run if CourtListener API key is available
    if: secrets.COURTLISTENER_API_KEY != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests
        env:
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
        run: uv run pytest -m integration -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            .pytest_cache/
            test-results.xml

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: integration-tests
    if: failure()
    steps:
      - name: Send Slack notification
        # Optional: Configure Slack webhook in repository secrets
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Integration tests failed for legal-research-mcp",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Integration Tests Failed* 🔴\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
