<ul class="space-y-3">
{% for case in results %}
    <li class="bg-white p-3 rounded shadow-sm border border-gray-100 hover:border-blue-300 transition-colors">
        <div class="flex justify-between items-start">
            <div class="font-medium text-gray-900">{{ case.case_name }}</div>
            <div class="text-xs text-gray-500 font-mono">{{ case.citation }}</div>
        </div>
        <div class="flex justify-between items-center mt-2 text-xs text-gray-500">
             <span>{{ case.court }} ({{ case.date_filed }})</span>
             <span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">Match: {{ (case.similarity_score * 100)|int }}%</span>
        </div>
    </li>
{% else %}
    <li class="text-center p-4">No similar cases found.</li>
{% endfor %}
</ul>
