apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: legal-research-mcp
  namespace: legal-research

# Resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

# Optional: Include Prometheus monitoring resources
# Uncomment if you have Prometheus Operator installed
# - servicemonitor.yaml

# Replicas override
replicas:
  - name: legal-research-mcp
    count: 3

# Image updates (convenient for CI/CD)
images:
  - name: ghcr.io/mightymikesapp/legal-research-mcp
    # Pin to an immutable tag or digest emitted by CI/CD to ensure reproducible rollouts
    newDigest: sha256:2f6b4f1c7d5f1d1d56b8a8a0193e32ed9f2a1d4a5b1c9f3e4e6f7a8b9c0d1e2
    # Uncomment to always pull the latest image
    # newPullPolicy: Always

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/part-of: legal-research-platform
  managed-by: kustomize

# Namespace for all resources
namespace: legal-research

# Patches for customizing resources
# Example: Scale down for development
# patches:
#   - target:
#       kind: Deployment
#       name: legal-research-mcp
#     patch: |-
#       - op: replace
#         path: /spec/replicas
#         value: 1

# Configuration for environment-specific overrides
# See overlays/dev, overlays/staging, overlays/prod
# Usage: kustomize build overlays/prod | kubectl apply -f -
