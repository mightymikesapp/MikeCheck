apiVersion: v1
kind: Service
metadata:
  name: legal-research-api
  namespace: legal-research
  labels:
    app.kubernetes.io/name: legal-research-mcp
    app.kubernetes.io/version: "0.1.0"
  annotations:
    description: "Service for Legal Research Assistant MCP API"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: legal-research-mcp
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP  # Optional: Session persistence
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

---
# Optional: Headless Service for direct pod communication
apiVersion: v1
kind: Service
metadata:
  name: legal-research-api-headless
  namespace: legal-research
  labels:
    app.kubernetes.io/name: legal-research-mcp
    app.kubernetes.io/version: "0.1.0"
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  selector:
    app.kubernetes.io/name: legal-research-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

---
# Optional: Ingress for external access (if using Nginx/Istio ingress controller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: legal-research-ingress-policy
  namespace: legal-research
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: legal-research-mcp
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Allow ingress from same namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
